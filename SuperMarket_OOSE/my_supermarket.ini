# my_supermarket.ini
# Default configuration for the supermarket system loaded at startup

# 1. Login as the default manager to authorize setup actions
login ceo 123456789

# 2. Trigger the internal setup (loads bank cards and default discount plans)
setup

# 3. Add items for the 3 mandatory categories: dairy, meat, and fruit-and-vegetables
addItem labneh dairy 3.00 0.50 30
addItem halloumi dairy 4.50 0.40 25
addItem kafta meat 12.50 0.50 5
addItem tawouk meat 8.00 0.50 20
addItem cucumber fruit-and-vegetables 0.40 0.20 100
addItem tomato fruit-and-vegetables 0.90 0.25 100

# 4. Register exactly one cashier
registerCashier Saad Dakdouki saad saadpwd

# 5. Register exactly one customer
registerCustomer Andrew Nohra andrew "Beirut" andrewpwd

# 6. Log out so the system is clean and ready for the tester
logout